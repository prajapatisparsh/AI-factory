# Model Configuration
# Supported providers: groq, gemini, openai, anthropic, ollama

default_provider: groq
default_model: llama-3.1-70b-versatile

providers:
  groq:
    name: "Groq (Fast)"
    env_key: "GROQ_API_KEY"
    models:
      - id: llama-3.1-70b-versatile
        name: "Llama 3.1 70B"
        context_window: 128000
        cost_per_1k_input: 0.0 # Free tier
        cost_per_1k_output: 0.0
        recommended_for: ["drafts", "qa"]
      - id: llama-3.1-8b-instant
        name: "Llama 3.1 8B (Fast)"
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        recommended_for: ["clarifications", "quick_tasks"]
      - id: mixtral-8x7b-32768
        name: "Mixtral 8x7B"
        context_window: 32768
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        recommended_for: ["general"]

  gemini:
    name: "Google Gemini"
    env_key: "GOOGLE_API_KEY"
    models:
      - id: gemini-1.5-flash
        name: "Gemini 1.5 Flash"
        context_window: 1000000
        cost_per_1k_input: 0.075
        cost_per_1k_output: 0.30
        recommended_for: ["vision", "documents", "long_context"]
      - id: gemini-1.5-pro
        name: "Gemini 1.5 Pro"
        context_window: 2000000
        cost_per_1k_input: 1.25
        cost_per_1k_output: 5.00
        recommended_for: ["complex_reasoning", "architecture"]

  openai:
    name: "OpenAI"
    env_key: "OPENAI_API_KEY"
    models:
      - id: gpt-4o
        name: "GPT-4o"
        context_window: 128000
        cost_per_1k_input: 2.50
        cost_per_1k_output: 10.00
        recommended_for: ["complex_reasoning", "evaluation"]
      - id: gpt-4o-mini
        name: "GPT-4o Mini"
        context_window: 128000
        cost_per_1k_input: 0.15
        cost_per_1k_output: 0.60
        recommended_for: ["drafts", "general"]
      - id: gpt-3.5-turbo
        name: "GPT-3.5 Turbo"
        context_window: 16385
        cost_per_1k_input: 0.50
        cost_per_1k_output: 1.50
        recommended_for: ["quick_tasks"]

  anthropic:
    name: "Anthropic Claude"
    env_key: "ANTHROPIC_API_KEY"
    models:
      - id: claude-3-5-sonnet-20241022
        name: "Claude 3.5 Sonnet"
        context_window: 200000
        cost_per_1k_input: 3.00
        cost_per_1k_output: 15.00
        recommended_for: ["complex_reasoning", "code_generation"]
      - id: claude-3-haiku-20240307
        name: "Claude 3 Haiku"
        context_window: 200000
        cost_per_1k_input: 0.25
        cost_per_1k_output: 1.25
        recommended_for: ["drafts", "quick_tasks"]

  ollama:
    name: "Ollama (Local)"
    env_key: null # No API key needed
    base_url: "http://localhost:11434"
    models:
      - id: llama3.1
        name: "Llama 3.1 (Local)"
        context_window: 128000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        recommended_for: ["offline", "privacy"]
      - id: codellama
        name: "CodeLlama (Local)"
        context_window: 16000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        recommended_for: ["code_generation"]
      - id: mistral
        name: "Mistral (Local)"
        context_window: 32000
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        recommended_for: ["general"]

# Agent-specific model preferences
agent_preferences:
  vision:
    provider: gemini
    model: gemini-1.5-flash
    reason: "Best for document/image analysis"

  pm:
    provider: groq
    model: llama-3.1-70b-versatile
    reason: "Good balance of quality and speed"

  tech_lead:
    provider: groq
    model: llama-3.1-70b-versatile
    reason: "Complex architecture decisions"

  backend:
    provider: groq
    model: llama-3.1-70b-versatile
    reason: "Detailed API specifications"

  frontend:
    provider: groq
    model: llama-3.1-70b-versatile
    reason: "Component specifications"

  qa:
    provider: groq
    model: llama-3.1-8b-instant
    reason: "Fast checklist generation"

  coach:
    provider: groq
    model: llama-3.1-8b-instant
    reason: "Quick rule extraction"
